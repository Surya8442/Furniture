apiVersion: apps/v1
kind: Deployment
metadata:
  name: furnature
  labels:
    app: furn
spec:
  replicas: 3
  selector:
    matchLabels:
      app: furn
  template:
    metadata:
      labels:
        app: furn
    spec:
      containers:
        - name: furncont
          image: surya8442/furniture:latest
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: myfurn-serv
spec:
  type: LoadBalancer
  selector:
    app: furn
  ports:
    - port: 80
      targetPort: 8080
  
