apiVersion: apps/v1
kind: Deployment
metadata:
  name: furnature
  labels:
    app: autoapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: furn
  template:
    metadata:
      labels:
        app: furn
    spec:
      containers:
        - name: furncont
          image: surya8442/furniture:latest
          ports:
            - containerPort: 1338

---
apiVersion: v1
kind: Service
metadata:
  name: myfurn-serv
spec:
  selector:
    app: furn
  ports:
    - protocol: TCP
      port: 80
      targetPort: 1338
  type: LoadBalancer
